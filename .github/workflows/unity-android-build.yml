name: Unity — Android Build

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'BogatyrskayaZastava/**'
      - 'scripts/**'
      - 'unity-scripts/**'

concurrency:
  group: unity-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: BogatyrskayaZastava/Library
          key: unity-lib-android-${{ hashFiles('BogatyrskayaZastava/Assets/**', 'BogatyrskayaZastava/Packages/**') }}
          restore-keys: unity-lib-android-

      - name: Build Android
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_USERNAME }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 2022.3.62f3
          targetPlatform: Android
          projectPath: BogatyrskayaZastava
          buildName: BogatyrskayaZastava
          androidExportType: androidPackage
          versioning: Semantic

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.run_number }}
          path: build/Android
          retention-days: 14
