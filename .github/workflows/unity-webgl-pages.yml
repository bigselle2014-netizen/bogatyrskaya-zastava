name: Unity — WebGL → GitHub Pages

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'BogatyrskayaZastava/**'

concurrency:
  group: unity-webgl-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-and-deploy:
    name: Build WebGL & Deploy to GitHub Pages
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: BogatyrskayaZastava/Library
          key: unity-lib-webgl-${{ hashFiles('BogatyrskayaZastava/Assets/**', 'BogatyrskayaZastava/Packages/**') }}
          restore-keys: |
            unity-lib-webgl-
            unity-lib-

      - name: Build WebGL
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_USERNAME }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 2022.3.62f3
          targetPlatform: WebGL
          projectPath: BogatyrskayaZastava
          buildName: BogatyrskayaZastava
          buildsPath: webgl-build

      - name: Find and fix WebGL output
        run: |
          echo "=== Build output structure ==="
          find webgl-build -maxdepth 4 -type f | head -20 || echo "webgl-build not found in workspace"
          ls -la webgl-build/ 2>/dev/null || true
          ls -la webgl-build/WebGL/ 2>/dev/null || true
          ls -la webgl-build/WebGL/BogatyrskayaZastava/ 2>/dev/null || true
          # Add .nojekyll if directory exists
          if [ -d "webgl-build/WebGL/BogatyrskayaZastava" ]; then
            touch webgl-build/WebGL/BogatyrskayaZastava/.nojekyll
            echo ".nojekyll added"
          else
            echo "ERROR: Build output directory not found!"
            exit 1
          fi

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: webgl-build/WebGL/BogatyrskayaZastava
          branch: gh-pages
          clean: true
          commit-message: "deploy: WebGL build ${{ github.run_number }}"
