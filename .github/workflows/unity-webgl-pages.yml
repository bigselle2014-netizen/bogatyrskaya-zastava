name: Unity — WebGL → GitHub Pages

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'BogatyrskayaZastava/**'
      - '.github/workflows/unity-webgl-pages.yml'

concurrency:
  group: unity-webgl-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    name: Build WebGL & Deploy to GitHub Pages
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: BogatyrskayaZastava/Library
          key: unity-lib-webgl-${{ hashFiles('BogatyrskayaZastava/Assets/**', 'BogatyrskayaZastava/ProjectSettings/**') }}
          restore-keys: |
            unity-lib-webgl-
            unity-lib-

      - name: Build WebGL
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_USERNAME }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 2022.3.62f3
          targetPlatform: WebGL
          projectPath: BogatyrskayaZastava
          buildName: BogatyrskayaZastava
          buildsPath: webgl-build
          allowDirtyBuild: true

      - name: Fix permissions and add .nojekyll
        run: |
          sudo chown -R $USER:$USER webgl-build/
          mkdir -p webgl-build/WebGL/BogatyrskayaZastava
          touch webgl-build/WebGL/BogatyrskayaZastava/.nojekyll

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: webgl-build/WebGL/BogatyrskayaZastava
          branch: gh-pages
          clean: true
          commit-message: "deploy: WebGL build ${{ github.run_number }}"
